# Nginx reverse proxy for EC2 deployment
# Serves two domains from one box:
#   api.wanjala.art      → Django API (reverse proxy)
#   demo.octopusintl.org → React frontend (static files)
#
# HTTPS termination via Let's Encrypt (Certbot)

upstream django {
    server web:8000;
    # Reuse idle connections to gunicorn instead of a fresh TCP handshake per
    # request. Requires proxy_http_version 1.1 + a cleared Connection header on
    # the proxying location (see `location /` below). 32 idle conns comfortably
    # covers the burst a data-heavy page fires.
    keepalive 32;
}

# Daphne — ASGI server for WebSocket traffic (Phase 7+8 of the
# Real-Time Observability Plan). Routed only via the `/ws/` location
# block below; everything else stays on gunicorn.
upstream daphne {
    server daphne:8001;
}

# Per-client-IP request rate limit (http context — this file is included
# inside http{} via conf.d/default.conf, same scope as the upstream blocks).
# Added 2026-07-01 after a vulnerability scanner hammered the box at ~15-25 r/s
# of 404 junk, saturating the 2-worker gunicorn and surfacing as intermittent
# 502s + multi-second stalls for real users. 20 r/s sustained per IP is far
# above any legitimate single-user browsing rate but crushes a sustained flood;
# burst=40 nodelay (applied per-location below) absorbs the parallel API calls a
# data-heavy page fires on load. CloudFront does NOT proxy the API (the browser
# calls api.wanjala.art directly), so each real visitor is their own key — users
# are never lumped together. 10m holds ~160k distinct IPs.
limit_req_zone $binary_remote_addr zone=api_rl:10m rate=20r/s;
limit_req_status 429;

# gzip — the API ships large JSON responses UNCOMPRESSED. Measured: a 200-row
# budget page is ~77KB raw → ~5KB gzipped (a 15x cut); the same holds for
# aggregations, member lists, notifications, ai/conversations. Compression is
# the single biggest bytes-on-the-wire win, and it matters most for the
# East-Africa ICP on slower / metered links. Level 5 is the CPU/ratio sweet spot
# for JSON (6 is marginally smaller for noticeably more CPU); min_length skips
# tiny bodies where the gzip framing costs more than it saves. gzip_proxied any
# compresses proxied upstream responses; gzip_vary adds `Vary: Accept-Encoding`
# so intermediary caches keep compressed and plain variants apart. text/html is
# always compressed by default and needn't be listed. (Bearer-auth JSON API over
# TLS — not the reflected-secret-in-HTML shape BREACH targets.)
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 256;
gzip_types
    application/json
    application/javascript
    application/xml
    application/xml+rss
    application/rss+xml
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

# HTTP — Certbot challenge + redirect to HTTPS
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── API: api.wanjala.art ─────────────────────────────────────────────
server {
    listen 443 ssl;
    # HTTP/2 — multiplex every request over ONE TLS connection. The browser caps
    # HTTP/1.1 at ~6 connections per host, so a data-heavy page that fires 15+
    # parallel API calls on load (the Messages inbox: ai/conversations, messaging
    # unread/conversations, membership/members, aggregations, notifications, …)
    # queues the 7th+ request client-side for 6-8s even though each server
    # response is sub-second (verified: solo 0.4s, 12-concurrent all <0.85s — the
    # server was never the bottleneck, the connection limit was). Under h2 they
    # all start immediately over a single connection. Separate `http2 on;`
    # directive is the nginx 1.25.1+ form (this box is 1.27); clients that don't
    # speak h2 fall back to HTTP/1.1 via ALPN automatically.
    http2 on;
    server_name api.wanjala.art;

    ssl_certificate     /etc/letsencrypt/live/api.wanjala.art/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.wanjala.art/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 50M;

    # Drop obvious vulnerability-scanner probes with 444 (close connection, no
    # response) BEFORE they reach gunicorn. These paths have no legitimate route
    # in this API — every hit is a bot fishing for a PHP/CGI/creds file. Keeping
    # them off the workers is the single biggest lever against the scanner flood.
    # A regex location takes precedence over the `/` prefix; the patterns are
    # narrow enough not to collide with /api/, /static/, /media/, or /ws/.
    location ~* (?:\.(?:php|cgi|pl|asp|aspx|jsp|lua|sh|bak|env)$|/\.(?:ssh|git|env|aws)/?|/etc/passwd|/cgi-bin/|/wp-(?:admin|login|content|includes)|shopplus|/vendor/phpunit) {
        return 444;
    }

    # WebSocket — route /ws/* to daphne. proxy_buffering MUST be off
    # so frames flush immediately; the long read timeout matches the
    # frontend reconnect strategy (sockets > 24h are an anti-pattern,
    # so 6h is generous).
    location /ws/ {
        proxy_pass http://daphne;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;
        proxy_read_timeout 6h;
        proxy_send_timeout 6h;
    }

    location / {
        # Per-IP rate limit (zone defined at http scope above). burst=40 nodelay
        # lets a page's initial fan-out of API calls through instantly, then caps
        # sustained request rate per IP so a single flooding client can't starve
        # the workers. Legit users are well under 20 r/s; scanners are not.
        limit_req zone=api_rl burst=40 nodelay;

        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # HTTP/1.1 + an empty Connection header lets nginx REUSE the upstream
        # keepalive pool (see `upstream django`). This is the API path → gunicorn
        # (WSGI, no websockets), so the old `Connection: upgrade` / `Upgrade`
        # headers were both unnecessary here AND they defeated keepalive by
        # forcing a per-request connection teardown. Real websocket traffic is
        # handled entirely by the `/ws/` → daphne block above.
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /app/media/;
        expires 7d;

        # CORS for CloudFront frontend fetching receipts/media
        set $cors_origin "";
        if ($http_origin ~* "^https://(d2wnv83yfoz6nw\.cloudfront\.net|demo\.octopusintl\.org|localhost:3000)$") {
            set $cors_origin $http_origin;
        }
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Range" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}

# Frontend moved to CloudFront — no longer served from this EC2.
