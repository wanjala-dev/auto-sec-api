# Initial Nginx config — HTTP only, before Certbot issues certificates.
# Frontend is on CloudFront — only the API domain needs ACME + proxy.

upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name api.wanjala.art;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        client_max_body_size 50M;
    }
}

# Catch-all — ACME challenges only
server {
    listen 80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 444;
    }
}
