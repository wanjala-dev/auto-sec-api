[tool.black]
line-length = 120
target-version = ["py312"]
exclude = '''
/(
    \.git
  | \.venv
  | __pycache__
  | migrations
  | static
  | staticfies
  | media
  | examples
)/
'''

[tool.ruff]
line-length = 120
target-version = "py312"
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "*/migrations/*",
    "static",
    "staticfies",
    "media",
    "examples",
]

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "SIM",    # flake8-simplify
    "RUF",    # ruff-specific rules
]
ignore = [
    "E501",   # line too long (handled by black)
    "B008",   # do not perform function call in argument defaults (common in Django)
    "B905",   # zip without strict= (Python 3.10+)
    "RUF012", # mutable class variables (common Django pattern for Meta, etc.)
    "SIM108", # use ternary operator (readability preference)
    "UP007",  # use X | Y for union types (keep Optional[] for Django compat)
]

[tool.ruff.lint.isort]
known-first-party = ["api", "components", "infrastructure", "apps"]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]  # unused imports in __init__ are re-exports
"*/tests/*" = ["B011"]    # assert False is fine in tests
"conftest.py" = ["F401"]  # fixture imports look unused
"api/celery.py" = ["F401", "E402"]  # intentional side-effect task-module imports
