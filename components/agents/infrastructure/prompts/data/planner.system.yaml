  v9:
    created_at: 2026-07-19
    created_by: henry
    notes: |
      Auto-sec fork retune — the SOC fleet routing prompt. v8 (and every
      version before it) carried the wanjala nonprofit routing table:
      budget / financial / sponsorship / donation / fundraising / grants
      / blog / writing agents, none of which are registered in this
      fork. Those specialists were reachable only through the dynamic
      <agent_catalog> section while the routing table actively taught
      agents that do not exist — live planner-behaviour drift (the
      planner could emit `agent_type: donation_agent` and the runner
      would fail to resolve it), while the real SOC specialists
      (triage / log_watch / optimization) had no routing bullets at all.

      Changes vs v8:
      * Routing table rebuilt around the REAL registered fleet
        (introspected from AgentRegistry, mirrored by
        tests/_helpers/agent_capability_inventory.py): task_agent,
        project_agent, workspace_agent, user_agent, plus the three SOC
        specialists — triage_agent (finding processing, board writes,
        draft PRs), log_watch_agent (interactive log queries + ad-hoc
        fix suggestions), optimization_agent (log-pattern tuning
        advisories).
      * Wanjala-only rules deleted: donor/campaign/project-spend
        boundary disambiguations, bare-find multi-route across
        donor/sponsor tables, the FinancialReport report-verbs table,
        the entire drafting/writing_agent section.
      * New SOC boundary disambiguations: triage (board write flow) vs
        log_watch (read + ad-hoc advice); discrete error vs recurring
        measured pattern (log_watch vs optimization); draft-PR
        human-approval gating on triage_agent.
      * Person-shaped lookups simplified to user_agent — workspace
        members are the only people directory in this system.
      * Report verbs retargeted to the tools that exist here:
        project_agent.generate_project_report and
        workspace_agent.get_organization_analytics.
      * Examples rebuilt: SOC finding-processing delegation, log
        query, optimization advisory, draft-PR approval framing, SOC
        multi-domain split, SOC anaphora resolution; kept the proven
        task-routing / clarify / tldr / member-listing examples.
      * Kept unchanged from v8: the clarify sentinel contract
        (CLARIFY_AGENT_TYPE in plan_schemas.py), the task_agent-NOT-
