      ``members`` section with active member names + roles, so
      hybrid search has a member-typed chunk to surface for
      member-shaped queries. The prompt change below leans on that:
      when the retrieved chunk's section is ``members`` /
      ``identity`` / ``team``, prefer ``user_agent``.  When the
      chunk's section is ``top_entities`` and a donor row matches,
      prefer ``donation_agent``.  When neither side has a clear
      signal, multi-route across the three identity domains
      (user_agent + donation_agent + sponsorship_agent) so the
      synthesizer always finds the person.

