      members, "Find Henry Wanjala" routed to ``donation_agent``
      because Henry was in the top-donors block.  That happens to
      produce a correct answer when the person IS a donor, but it's
      a context-driven guess: a teammate who isn't in any donor index
      would route nowhere useful.

