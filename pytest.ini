[pytest]
# `addopts = --ds=` is precedence #1 in pytest-django (CLI > env > pytest.ini
# fallback), so this beats the container env `DJANGO_SETTINGS_MODULE=api.settings.local`
# baked into compose-web-1 and forces SQLite under `.pytest-dbs/` instead of
# polluting the local Postgres with `test_*` databases. Keep the
# `DJANGO_SETTINGS_MODULE` line below as a belt-and-suspenders fallback for
# environments that strip `addopts`.
#
# `--reuse-db` skips rebuilding the SQLite schema on every pytest invocation;
# pair with `make test-fresh` (which passes `--create-db`) when models change.
# Combined with the tmpfs-mounted `.pytest-dbs/` in docker-compose.local.yml,
# this makes repeated gate runs nearly free of DB setup cost. Migrations are
# disabled (django_db_use_migrations=False in conftest.py), so schema staleness
# from model changes is the only trap — run `make test-fresh` after model edits.
addopts = --ds=api.settings.test --reuse-db
DJANGO_SETTINGS_MODULE = api.settings.test
python_files = tests.py test_*.py *_tests.py

markers =
    unit: Pure unit tests (no database, no framework)
    integration: Integration tests (database, full stack)
    arch: Architecture guardrail tests
    real_feature_flags: Opt out of the autouse auto-enable fixture; evaluate flags against the real DB/cache cascade.

testpaths =
    components
    tests
