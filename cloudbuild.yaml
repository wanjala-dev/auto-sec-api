# [START cloudrun_django_cloudmigrate]
steps:
  - id: "build image"
    name: "gcr.io/cloud-builders/docker"
    args: [
      "build", 
      "-t", 
      "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPOSTIORY_NAME}/${_IMAGE_NAME}:${BUILD_ID}", 
      "."
    ]

  - id: "push image"
    name: "gcr.io/cloud-builders/docker"
    args: ["push", "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPOSTIORY_NAME}/${_IMAGE_NAME}:${BUILD_ID}"]

  - id: "make migrations"
    name: "gcr.io/google-appengine/exec-wrapper"
    args:
      [
        "-i",
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPOSTIORY_NAME}/${_IMAGE_NAME}:${BUILD_ID}",
        "-s",
        "${PROJECT_ID}:${_REGION}:${_INSTANCE_NAME}",
        "-e",
        "VAULT_URL=${_VAULT_URL}",
        "-e",
        "VAULT_TOKEN=${_VAULT_TOKEN}",
        "-e",
        "DJANGO_SETTINGS_MODULE=api.settings.dev",
        "--",
        "python",
        "manage.py",
        "makemigrations"
      ]

  - id: "apply migrations"
    name: "gcr.io/google-appengine/exec-wrapper"
    args:
      [
        "-i",
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPOSTIORY_NAME}/${_IMAGE_NAME}:${BUILD_ID}",
        "-s",
        "${PROJECT_ID}:${_REGION}:${_INSTANCE_NAME}",
        "-e",
        "VAULT_URL=${_VAULT_URL}",
        "-e",
        "VAULT_TOKEN=${_VAULT_TOKEN}",
        "-e",
        "DJANGO_SETTINGS_MODULE=api.settings.dev",
        "--",
        "python",
        "manage.py",
        "migrate"
      ]

  - id: "apply migrations to tenant"
    name: "gcr.io/google-appengine/exec-wrapper"
    args:
      [
        "-i",
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPOSTIORY_NAME}/${_IMAGE_NAME}:${BUILD_ID}",
        "-s",
        "${PROJECT_ID}:${_REGION}:${_INSTANCE_NAME}",
        "-e",
        "VAULT_URL=${_VAULT_URL}",
        "-e",
        "VAULT_TOKEN=${_VAULT_TOKEN}",
        "-e",
        "DJANGO_SETTINGS_MODULE=api.settings.dev",
        "--",
        "sh",
        "-c",
        "for database in seed art linkthegap; do python manage.py migrate --database=$database; done",
      ]

  - id: "collect static"
    name: "gcr.io/google-appengine/exec-wrapper"
    args:
      [
        "-i",
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPOSTIORY_NAME}/${_IMAGE_NAME}:${BUILD_ID}",
        "-s",
        "${PROJECT_ID}:${_REGION}:${_INSTANCE_NAME}",
        "-e",
        "VAULT_URL=${_VAULT_URL}",
        "-e",
        "VAULT_TOKEN=${_VAULT_TOKEN}",
        "-e",
        "DJANGO_SETTINGS_MODULE=api.settings.dev",
        "--",
        "python",
        "manage.py",
        "collectstatic",
        "--verbosity",
        "2",
        "--no-input"
      ]

  - id: "deploy app"
    name: "gcr.io/cloud-builders/gcloud"
    args: 
      [ 
        "beta", 
        "run", 
        "deploy", 
        "${_SERVICE_NAME}", 
        "--image", 
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPOSTIORY_NAME}/${_IMAGE_NAME}:${BUILD_ID}", 
        "--region", 
        "${_REGION}", 
        "--tag", 
        "${_BUILD_VERSION}", 
        "--platform", 
        "managed", 
        "--allow-unauthenticated",
        "--set-env-vars", 
        "GOOGLE_CLIENT_ID='${_GOOGLE_CLIENT_ID}',GOOGLE_CLIENT_SECRET='${_GOOGLE_CLIENT_SECRET}',SOCIAL_SECRET='${_SOCIAL_SECRET}',DJANGO_SETTINGS_MODULE=${_DJANGO_SETTINGS_MODULE},VAULT_TOKEN=${_VAULT_TOKEN},VAULT_URL=${_VAULT_URL}",
        "--project",
        "${PROJECT_ID}"
      ]

logsBucket: 'gs://charityseed-django'
options:
  logging: GCS_ONLY
  substitution_option: 'ALLOW_LOOSE'

substitutions:
  _INSTANCE_NAME: django-app-instance
  _REGION: us-central1
  _SERVICE_NAME: django-cloudrun-service
  _IMAGE_NAME: django-cloudrun-service
  _ARTIFACT_REPOSTIORY_NAME: django-repository
  _VAULT_URL: 
  _VAULT_TOKEN: 
  _GOOGLE_CLIENT_ID:
  _GOOGLE_CLIENT_SECRET:
  _SOCIAL_SECRET:
  _DJANGO_SETTINGS_MODULE:
  _BUILD_VERSION:
  _SERVICE_ACCOUNT: gitlab-workload-federation@charityseed.iam.gserviceaccount.com

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPOSTIORY_NAME}/${_IMAGE_NAME}"
# [END cloudrun_django_cloudmigrate]

