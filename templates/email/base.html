<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ site_name }}{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background-color:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <!-- Preheader: shown by Gmail/Apple Mail/Outlook in the inbox preview line, hidden inside the email body. -->
  <div style="display:none;font-size:1px;color:#ffffff;line-height:1px;max-height:0;max-width:0;opacity:0;overflow:hidden;mso-hide:all;">{% block preheader %}{% endblock %}</div>
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f5f5f5;padding:40px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:12px;overflow:hidden;">
          <!-- Brand accent bar -->
          <tr>
            <td style="background-color:{{ brand_primary|default:'#42B98F' }};height:6px;line-height:6px;font-size:6px;">&nbsp;</td>
          </tr>
          {% if workspace_logo_url %}
          <!-- Logo -->
          <tr>
            <td style="padding:24px 40px 0;text-align:center;">
              <img src="{{ workspace_logo_url }}" alt="{{ site_name }}" style="max-height:40px;">
            </td>
          </tr>
          {% endif %}
          <!-- Heading -->
          <tr>
            <td style="padding:32px 40px 16px;text-align:center;">
              <h1 style="margin:0;font-size:22px;font-weight:600;color:#1a1a2e;">{% block heading %}{% endblock %}</h1>
              {% block subheading %}{% endblock %}
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:0 40px 24px;">
              {% block content %}{% endblock %}
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:20px 40px 32px;border-top:1px solid #eee;">
              {% block footer %}
              <p style="font-size:12px;color:#999;margin:0;text-align:center;">
                You're receiving this email from {{ site_name }}.
              </p>
              {% endblock %}
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
